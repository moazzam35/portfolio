<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Portfolio Message</title>
</head>
<body style="margin:0;padding:0;background:#0a0a0a;font-family:'Segoe UI',Helvetica,Arial,sans-serif;">

  <!-- Wrapper -->
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0a0a0a;padding:40px 20px;">
    <tr>
      <td align="center">

        <!-- Card -->
        <table width="600" cellpadding="0" cellspacing="0" style="background:#111111;border-radius:16px;overflow:hidden;border:1px solid #1a1a1a;">

          <!-- Header Bar -->
          <tr>
            <td style="background:linear-gradient(135deg,#0a0a0a 0%,#1a1a1a 100%);padding:32px 40px;border-bottom:1px solid #222;">
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td>
                    <div style="font-size:13px;color:#666;letter-spacing:2px;text-transform:uppercase;font-weight:600;">New Message From</div>
                    <div style="font-size:28px;font-weight:800;color:#d4ff00;margin-top:6px;letter-spacing:-0.5px;">{{name}}</div>
                  </td>
                  <td align="right" valign="top">
                    <div style="display:inline-block;background:rgba(212,255,0,0.1);border:1px solid rgba(212,255,0,0.2);border-radius:8px;padding:8px 16px;">
                      <span style="font-size:12px;color:#d4ff00;font-weight:600;letter-spacing:1px;">PORTFOLIO</span>
                    </div>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:36px 40px;">

              <!-- Info Row -->
              <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:28px;">
                <tr>
                  <td width="50%" valign="top" style="padding-right:16px;">
                    <div style="font-size:11px;color:#555;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-bottom:6px;">Email</div>
                    <div style="font-size:15px;color:#ccc;">
                      <a href="mailto:{{email}}" style="color:#d4ff00;text-decoration:none;">{{email}}</a>
                    </div>
                  </td>
                  <td width="50%" valign="top" style="padding-left:16px;">
                    <div style="font-size:11px;color:#555;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-bottom:6px;">Date</div>
                    <div style="font-size:15px;color:#ccc;">{{date}}</div>
                  </td>
                </tr>
              </table>

              <!-- Divider -->
              <div style="height:1px;background:#222;margin-bottom:28px;"></div>

              <!-- Message Label -->
              <div style="font-size:11px;color:#555;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-bottom:12px;">Message</div>

              <!-- Message Bubble -->
              <div style="background:#1a1a1a;border-left:3px solid #d4ff00;border-radius:0 10px 10px 0;padding:20px 24px;">
                <div style="font-size:15px;color:#ddd;line-height:1.75;">{{message}}</div>
              </div>

            </td>
          </tr>

          <!-- Reply Button -->
          <tr>
            <td style="padding:0 40px 36px;">
              <a href="mailto:{{email}}?subject=Re: Your message on my portfolio&body=Hi {{name}},%0D%0A%0D%0A" style="display:inline-block;background:#d4ff00;color:#000;text-decoration:none;font-size:14px;font-weight:700;padding:14px 32px;border-radius:10px;letter-spacing:0.5px;">Reply to {{name}}</a>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#0a0a0a;padding:20px 40px;border-top:1px solid #1a1a1a;">
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td>
                    <div style="font-size:11px;color:#444;letter-spacing:0.5px;">
                      Sent via Portfolio Contact Form &middot; moazzampasha356@gmail.com
                    </div>
                  </td>
                  <td align="right">
                    <div style="font-size:11px;color:#444;letter-spacing:0.5px;">
                      {{time}}
                    </div>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

        </table>
        <!-- /Card -->

      </td>
    </tr>
  </table>
  <!-- /Wrapper -->

</body>
</html>
